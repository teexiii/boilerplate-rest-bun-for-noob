#####################################
# CONFIG - Change these for new projects
#####################################
# APP_NAME:      bun-api
# NAMESPACE:     namespace-name
# IMAGE:         reg.ult.vn/digitop/boilerplate-bun-for-noob:dev
# CONTAINER_PORT: 3000
# NODE_PORT:     30059
# HEALTH_PATH:   /api/hz
# CONFIGMAP:     bun-api-config
#####################################

apiVersion: v1
kind: Namespace
metadata:
  name: namespace-name
  labels:
    app.kubernetes.io/name: namespace-name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bun-api
  namespace: namespace-name
  labels:
    app: bun-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: bun-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bun-api
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: bun-api
          image: reg.ult.vn/digitop/boilerplate-bun-for-noob:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: bun-api-config
          env:
            - name: PORT
              value: '3000'
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '1000m'
          lifecycle:
            preStop:
              exec:
                command: ['sh', '-c', 'sleep 10']
          startupProbe:
            httpGet:
              path: /api/hz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/hz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/hz
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: bun-api
  namespace: namespace-name
  labels:
    app: bun-api
spec:
  type: NodePort
  selector:
    app: bun-api
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30059
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bun-api-hpa
  namespace: namespace-name
  labels:
    app: bun-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bun-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
