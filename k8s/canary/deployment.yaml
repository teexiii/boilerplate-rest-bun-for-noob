#####################################
# CONFIG - Change these for new projects
#####################################
# APP_NAME:      bun-api
# NAMESPACE:     namespace-name
# IMAGE:         reg.ult.vn/digitop/boilerplate-bun-for-noob:canary
# CONTAINER_PORT: 3000
# HEALTH_PATH:   /api/hz
# CONFIGMAP:     bun-api-config
#####################################

apiVersion: v1
kind: Namespace
metadata:
  name: namespace-name
  labels:
    app.kubernetes.io/name: namespace-name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bun-api
  namespace: namespace-name
  labels:
    app: bun-api
    app-version: bun-api-1
    deploy-strategy: v2
    main-app: bun-api
    owner: tam-lam
    phase: live
    updated-by: tam-lam
    workspace: topgroup
spec:
  replicas: 1
  minReadySeconds: 10
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: bun-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bun-api
        app-version: bun-api-1
        deploy-strategy: v2
        main-app: bun-api
        owner: tam-lam
        phase: live
        updated-by: tam-lam
        workspace: topgroup
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: bun-api
          image: reg.ult.vn/digitop/boilerplate-bun-for-noob:canary
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: bun-api-config
          env:
            - name: PORT
              value: '3000'
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '1000m'
          startupProbe:
            httpGet:
              path: /api/hz
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /api/hz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/hz
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: bun-api
  namespace: namespace-name
  labels:
    app: bun-api
    app-version: bun-api-1
    main-app: bun-api
    owner: tam-lam
    phase: live
    updated-by: tam-lam
    workspace: topgroup
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: bun-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bun-api-hpa
  namespace: namespace-name
  labels:
    app: bun-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bun-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bun-api-ingress
  namespace: namespace-name
  labels:
    app: bun-api
    app-version: bun-api-1
    deploy-strategy: v2
    main-app: bun-api
    owner: tam-lam
    phase: live
    project: bun-api
    updated-by: tam-lam
    workspace: topgroup
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/limit-rps: '200'
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~ /\.git { deny all; return 403; }
      location ~ /\.env { deny all; return 403; }
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - domain.com
      secretName: tls-domain-com
  rules:
    - host: domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bun-api
                port:
                  number: 3000
